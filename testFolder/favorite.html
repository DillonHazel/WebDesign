<h2>My Favorite Books</h2>

<table>
  <thead>
    <tr>
      <th>Title</th>
      <th>Author</th>
      <th>Genre</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Johnny Dangerously</td>
      <td>Amy Heckerling</td>
      <td>Comedy</td>
    </tr>
    <tr>
      <td>Pride and Prejudice</td>
      <td>Jane Austen</td>
      <td>Classic Romance</td>
    </tr>
  </tbody>
</table>

<form>
  <fieldset>
    <legend>Favorite Book Survey</legend>

    <label>Your Name:</label>
    <input type="text" name="name" placeholder="Your name">

    <label>Email Address:</label>
    <input type="email" name="email" placeholder="Your email">

    <label>Submit Your Favorite Book:</label>
    <input type="text" name="favorite-book" placeholder="Favorite book">

    <label>Favorite Genre:</label>
    <select name="genre">
      <option>Classic</option>
      <option>Fantasy</option>
      <option>Sci-Fi</option>
      <option>Romance</option>
    </select>

    <p>Preferred Format:</p>
    <label><input type="radio" name="format"> Print</label>
    <label><input type="radio" name="format"> eBook</label>
    <label><input type="radio" name="format"> Audiobook</label>

    <label>
      <input type="checkbox" name="subscribe">
      Subscribe to newsletter
    </label>

    <button type="submit">Submit</button>
  </fieldset>
</form>

</html>
